version: '3.8'

services:
  # ===== Прокси =====
  tg-ws-proxy:
    build: .
    container_name: tg-proxy-backend
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8446
      - SECRET=${SECRET}
      - FAKE_TLS_DOMAIN=${FAKE_TLS_DOMAIN}
      - PUBLIC_ADDRESS=${PUBLIC_ADDRESS}
      - PUBLIC_PORT=${PUBLIC_PORT}
    # не публикуем порт наружу, доступ только через nginx

  # ===== Nginx Stream (прокси) =====
  nginx:
    image: nginx:stable
    container_name: tg-proxy-nginx
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT}:9443"   # внешний порт прокси
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    environment:
      - DOMAIN=${FAKE_TLS_DOMAIN}
    entrypoint:
      - /bin/bash
      - -c
      - |
        envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    depends_on:
      - tg-ws-proxy

  # ===== Веб-страница (отдельный порт) =====
  web:
    image: nginx:alpine
    container_name: tg-proxy-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./web/index.template:/usr/share/nginx/html/index.template:ro
    environment:
      - PUBLIC_PORT=${PUBLIC_PORT}
      - FAKE_TLS_DOMAIN=${FAKE_TLS_DOMAIN}
      - SECRET=${SECRET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        envsubst '$$PUBLIC_PORT $$FAKE_TLS_DOMAIN $$SECRET' < /usr/share/nginx/html/index.template > /usr/share/nginx/html/index.html
        exec nginx -g 'daemon off;'
